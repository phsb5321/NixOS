# MangoHud Configuration - Compact Performance Overlay
# Toggle: Right Shift + F12 | Logging: Left Shift + F2

# --- Layout ---
position=top-right
round_corners=8
hud_compact=1
table_columns=2
font_size=18
background_alpha=0.3
alpha=0.9

# --- Metrics Shown ---
fps
frametime=0
gpu_stats
gpu_temp
gpu_power
gpu_load_change
cpu_stats
cpu_temp
cpu_load_change
ram
vram

# --- Styling ---
gpu_load_color=39F900,FDFD09,B22222
cpu_load_color=39F900,FDFD09,B22222
fps_color_change
fps_value=30,60

# --- Controls ---
toggle_hud=Shift_R+F12
toggle_logging=Shift_L+F2
toggle_hud_position=Shift_R+F11

# --- Limits ---
fps_limit=0
vsync=0

# --- Logging ---
output_folder=/home/notroot/mangohud-logs
log_duration=0
